<!DOCTYPE html>
<html lang="en">
<head> <link rel="icon" type="image/png" href="assets/favicon.png">
<meta charset="UTF-8">
<title>Plandeck — Team Dashboard</title>
<link rel="icon" type="image/png" href="assets/favicon-transparent.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--bg:#ffffff;--surface:#ffffff;--surface-2:#f7f7fa;--border:rgba(32,41,69,.14);--line:rgba(32,41,69,.4);--text:#202945;--text-soft:rgba(32,41,69,.6);--brand:#FF6C0E;--brand-dark:#e05f0a;--brand-soft:#ffede0;--radius-lg:20px;--radius-md:14px;--radius-sm:10px;--shadow-card:none;--shadow-pop:none;--planned:#4B5F80;--planned-bg:#eaf6fd;--progress:#FF6C0E;--progress-bg:#fff1e2;--done:#3BAF90;--done-bg:#e6f7f1;--danger:#AC5D85;--danger-bg:#f7e9f0}
.dark{color-scheme:dark;--bg:#14192b;--surface:#1c2338;--surface-2:#242b45;--border:rgba(255,255,255,.09);--line:rgba(255,255,255,.08);--text:#eef0f7;--text-soft:rgba(238,240,247,.58);--brand:#FF8A3D;--brand-dark:#FFA65C;--brand-soft:rgba(255,138,61,.16);--planned:#7AB8FF;--planned-bg:rgba(122,184,255,.14);--progress:#FF8A3D;--progress-bg:rgba(255,138,61,.14);--done:#4ECBA5;--done-bg:rgba(78,203,165,.14);--danger:#E894AC;--danger-bg:rgba(232,148,172,.14)}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}
html{scrollbar-color:var(--border) var(--bg)}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}
h1,h2,h3,.drawer-title,.brand-mark,.month-label{font-weight:800}
.field-label,.drawer-section-label,.side-title,.login-sub,.weekday,.task-meta,.day-num{font-weight:300}
#root{height:100%}
a{color:var(--brand)}
a:hover{color:var(--brand-dark)}
button{font-family:inherit}
.input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;margin-bottom:12px;font-family:inherit}
.input-sm{padding:7px 10px;font-size:13px;margin-bottom:0}
textarea.input{resize:vertical}
.btn{border:none;border-radius:var(--radius-sm);padding:10px 16px;font-weight:600;font-size:14px;cursor:pointer;transition:transform .12s,opacity .12s,background .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-dark)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--surface-2);color:var(--text)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--danger-bg);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--text-soft)}
.btn-ghost:hover{color:var(--text)}
.btn-block{width:100%}
.btn-sm{padding:6px 12px;font-size:13px}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:15px}
.icon-btn:hover{background:var(--surface-2)}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--border);background:var(--surface);color:var(--text-soft);border-radius:999px;padding:6px 12px;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.chip-clickable{cursor:pointer;transition:background .12s}
.chip-clickable:hover{background:var(--surface-2)}
.chip-active{border-color:transparent;font-weight:600}
.chip-participant{background:var(--brand-soft);color:var(--brand-dark);border:none}
.chip-x{border:none;background:transparent;color:inherit;cursor:pointer;font-size:14px;line-height:1;padding:0}
.chip-add{cursor:pointer;color:var(--brand)}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.avatar-xs{width:16px;height:16px;font-size:8px}
.avatar-sm{width:22px;height:22px;font-size:10px}

/* login */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.login-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:40px;width:100%;max-width:400px}
.login-mark{font-weight:800;color:var(--brand);letter-spacing:.02em;margin-bottom:16px;font-size:15px;display:flex;align-items:center;gap:8px}
.login-mark-logo{width:24px;height:24px;object-fit:contain}
.login-card h1{margin:0 0 8px;font-size:26px}
.login-sub{color:var(--text-soft);font-size:14px;margin:0 0 24px}
.login-suggest{margin-top:20px;font-size:13px;color:var(--text-soft)}
.login-suggest span{display:block;margin-bottom:8px}

/* app shell */
.app-shell{height:100vh;display:flex;flex-direction:column;color:var(--text)}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:24px}
.brand-mark{font-weight:800;color:var(--brand);font-size:16px}
.month-nav{display:flex;align-items:center;gap:10px}
.nav-btn{border:1px solid var(--border);background:var(--surface);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--text);font-size:16px}
.nav-btn:hover{background:var(--surface-2)}
.month-label{font-weight:700;font-size:15px;min-width:150px;text-align:center}
.header-right{display:flex;align-items:center;gap:10px}
.user-menu-wrap{position:relative}
.user-chip{background:var(--brand-soft);color:var(--brand-dark);border:none;border-radius:999px;padding:8px 16px;font-weight:600;cursor:pointer;font-size:14px}
.app-body{flex:1;display:flex;overflow:hidden}

/* sidebar */
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:22px}
.side-nav{display:flex;flex-direction:column;gap:4px;background:var(--surface-2);border-radius:var(--radius-sm);padding:4px}
.side-nav-item{background:transparent;border:none;padding:9px 12px;border-radius:8px;text-align:left;cursor:pointer;color:var(--text-soft);font-weight:600;font-size:14px}
.side-nav-item:hover{color:var(--text)}
.side-nav-active{background:var(--surface);color:var(--brand-dark);border:1px solid var(--border)}
.presence-list{display:flex;flex-direction:column;gap:10px}
.presence-row{display:flex;align-items:center;gap:10px}
.presence-avatar-wrap{position:relative;flex-shrink:0}
.presence-dot{position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;background:var(--done);border:2px solid var(--surface)}
.presence-info{display:flex;flex-direction:column;gap:1px;min-width:0}
.presence-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.presence-activity{font-size:11px;font-weight:300;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-title{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft);font-weight:700;margin-bottom:10px}
.side-block{display:flex;flex-direction:column;gap:8px}
.side-task{display:flex;flex-direction:column;gap:2px;background:var(--surface-2);border:none;border-radius:var(--radius-sm);padding:8px 10px;text-align:left;cursor:pointer}
.side-task:hover{background:var(--border)}
.side-task-title{font-size:13px;font-weight:600;color:var(--text)}
.side-task-sub{font-size:11px;color:var(--text-soft)}
.filter-group{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.empty-hint{color:var(--text-soft);font-size:13px;padding:6px 0}

/* main / calendar */
.app-main{flex:1;overflow-y:auto;padding:20px 24px}
.calendar{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:visible}
.calendar-weekdays{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--line);border-radius:var(--radius-lg) var(--radius-lg) 0 0;overflow:hidden}
.weekday{padding:10px;text-align:center;font-size:12px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.04em}
.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-radius:0 0 var(--radius-lg) var(--radius-lg)}
.day-cell{min-height:118px;min-width:0;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px;display:flex;flex-direction:column;gap:6px}
.day-cell-empty{background:var(--surface-2)}
.day-cell-today{background:var(--brand-soft)}
.day-cell-head{display:flex;align-items:center;justify-content:space-between}
.day-num{font-size:13px;color:var(--text-soft);font-weight:600}
.day-num-today{color:var(--brand-dark);font-weight:800}
.day-add{border:none;background:transparent;color:var(--text-soft);cursor:pointer;font-size:15px;border-radius:6px;width:20px;height:20px;line-height:1}
.day-add:hover{background:var(--border);color:var(--text)}
.day-cards{display:flex;flex-direction:column;gap:4px}
.mini-card{border-radius:8px;padding:5px 7px;font-size:12px;font-weight:600;cursor:grab;color:var(--text);min-width:0}
.mini-card-title{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.mini-card-time{display:block;font-size:10px;font-weight:300;color:var(--text-soft);margin-top:1px}
.mini-card-subrow{display:flex;align-items:center;gap:5px;margin-top:1px}
.mini-card-subrow .mini-card-time{margin-top:0}
.mini-card-live{border:1px solid var(--brand)}
.mini-card-live-tag{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--brand-dark);margin-top:2px}
.mini-card .category-tag{font-size:9px;padding:2px 6px}
.day-more{border:none;background:transparent;color:var(--text-soft);font-size:11px;text-align:left;cursor:pointer;padding:2px 4px}
.day-more:hover{color:var(--brand)}

/* status pill */
.status-pill-wrap{position:relative;display:inline-block}
.status-pill{border:none;border-radius:999px;padding:6px 14px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.status-pill.lg{padding:8px 16px;font-size:14px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot-inline{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding-left:2px}
.status-dot-inline::before{content:'';width:7px;height:7px;border-radius:50%;background:inherit}
.status-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:6px;z-index:20;min-width:150px}
.status-menu-item{display:flex;align-items:center;gap:8px;width:100%;border:none;background:transparent;padding:8px 10px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;text-align:left}
.status-menu-item:hover{background:var(--surface-2)}

/* drawer / modal */
.drawer-overlay{position:fixed;inset:0;background:rgba(32,41,69,.35);display:flex;justify-content:flex-end;z-index:100}
.drawer{width:420px;max-width:92vw;height:100%;background:var(--surface);padding:28px;overflow-y:auto;position:relative;border-left:1px solid var(--border)}
.modal{width:460px;max-width:92vw;max-height:88vh;overflow-y:auto;margin:auto;background:var(--surface);border-radius:var(--radius-lg);padding:28px;position:relative;border:1px solid var(--border)}
.modal-sm{width:380px}
.drawer-close{position:absolute;top:20px;right:20px;border:none;background:var(--surface-2);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--text-soft)}
.drawer-close:hover{color:var(--text)}
.drawer-title{margin:14px 0 4px;font-size:22px}
.drawer-date{color:var(--text-soft);font-size:13px;margin-bottom:12px}
.drawer-desc{color:var(--text);font-size:14px;line-height:1.5;margin-bottom:20px}
.drawer-section{margin-bottom:22px}
.btn-danger.btn-block{margin-top:4px}
.drawer-section-label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft);font-weight:700;margin-bottom:10px}
.field-label{display:block;font-size:12px;font-weight:700;color:var(--text-soft);margin-bottom:6px}
.participants{display:flex;flex-direction:column;gap:8px;position:relative}
.picker-pop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;display:flex;flex-direction:column;gap:6px;z-index:15}
.picker-item{border:none;background:var(--surface);border-radius:8px;padding:8px 10px;text-align:left;cursor:pointer;font-size:13px}
.picker-item:hover{background:var(--border)}
.picker-new{display:flex;gap:6px;margin-top:4px}

/* tasks */
.task-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.task-row{display:flex;align-items:center;gap:10px;background:var(--surface-2);border-radius:var(--radius-sm);padding:8px 10px}
.task-row-overdue{border:1px solid var(--danger)}
.task-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--brand);flex-shrink:0}
.task-info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.task-title{font-size:13px;font-weight:600}
.task-done{text-decoration:line-through;color:var(--text-soft)}
.task-meta{font-size:11px;color:var(--text-soft)}
.task-overdue{color:var(--danger);font-weight:700}
.task-remove{border:none;background:transparent;color:var(--text-soft);cursor:pointer;font-size:15px}
.new-task-form{display:flex;flex-wrap:wrap;gap:6px}
.new-task-form input.input,.new-task-form select.input{flex:1 1 130px;min-width:0}
.new-task-form .task-date-range{flex:1 1 100%;flex-wrap:wrap}
.new-task-form .task-date-range input{flex:1 1 130px;min-width:0}
.new-task-form button{flex:1 1 100%}

/* personal view */
.personal-view{display:flex;flex-direction:column;gap:24px}
.personal-section h3{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:8px}
.personal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.activity-tile{background:var(--surface);border-radius:var(--radius-md);padding:14px;display:flex;flex-direction:column;gap:6px;text-align:left;border:1px solid var(--border);cursor:pointer}
.activity-tile:hover{border-color:var(--brand)}
.activity-tile-live{border:1px solid var(--brand);background:var(--brand-soft)}
.activity-tile-title{font-weight:700;font-size:14px}
.activity-tile-date{font-size:12px;color:var(--text-soft)}
.my-activities-list{display:flex;flex-direction:column;gap:8px}
.my-activity-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 16px;text-align:left;cursor:pointer;overflow:hidden}
.my-activity-row:hover{border-color:var(--text-soft)}
.my-activity-row-live{background:var(--brand-soft);border-color:var(--brand)}
.my-activity-bar{width:5px;align-self:stretch;border-radius:3px;flex-shrink:0}
.my-activity-main{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
.my-activity-title{font-weight:700;font-size:15px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-activity-meta{font-size:12px;font-weight:300;color:var(--text-soft)}
.status-badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;flex-shrink:0;white-space:nowrap}
.category-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:3px 8px;border-radius:6px;background:var(--surface-2);color:var(--text-soft);border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.category-badge{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:6px 12px;border-radius:8px;background:var(--surface-2);color:var(--text-soft);border:1px solid var(--border);cursor:pointer}
.category-badge-lg{font-size:13px}
.drawer-tags{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.personal-columns{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}
.count-badge{background:var(--surface-2);color:var(--text-soft);font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700}
.count-danger{background:var(--danger-bg);color:var(--danger)}
.count-done{background:var(--done-bg);color:var(--done)}

/* weekly summary */
.weekly-header{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.weekly-range{font-weight:800;font-size:16px;min-width:170px}
.weekly-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px}
.weekly-stat{background:var(--surface);border:1px solid var(--border);border-left:3px solid;border-radius:var(--radius-md);padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.weekly-stat-num{font-size:26px;font-weight:800}
.weekly-stat-label{font-size:12px;font-weight:300;color:var(--text-soft)}
.weekly-columns{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.weekly-col{display:flex;flex-direction:column;gap:8px}
.weekly-col-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;margin-bottom:2px}
.analytics-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-bottom:8px}
.analytics-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;min-width:0}
.analytics-card-title{font-weight:800;font-size:14px;margin-bottom:14px}
.analytics-card-body{display:flex;align-items:center;gap:20px}
.donut-wrap{flex-shrink:0}
.legend{display:flex;flex-direction:column;gap:7px;min-width:0;flex:1}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px;min-width:0}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-label{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend-val{color:var(--text-soft);font-weight:300;white-space:nowrap}
.task-stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.task-stat{display:flex;flex-direction:column;gap:2px;align-items:center;text-align:center}
.task-stat-num{font-size:24px;font-weight:800}
.task-stat-label{font-size:11px;font-weight:300;color:var(--text-soft)}
.progress-bar{height:8px;background:var(--surface-2);border-radius:999px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--done);border-radius:999px}
.progress-bar-label{font-size:11px;color:var(--text-soft);margin-top:6px;font-weight:300}
.team-activity-list{display:flex;flex-direction:column;gap:12px}
.team-activity-row{display:flex;align-items:center;gap:10px}
.team-activity-name{font-size:13px;font-weight:600;width:90px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-activity-badge{margin-left:4px}
.team-activity-bar-track{flex:1;height:8px;background:var(--surface-2);border-radius:999px;overflow:hidden}
.team-activity-bar-fill{height:100%;background:var(--brand);border-radius:999px}
.team-activity-count{font-size:12px;font-weight:700;color:var(--text-soft);width:16px;text-align:right}
.recurring-chip{background:var(--surface-2);color:var(--text-soft);margin:10px 0 0;display:inline-flex}
.summary-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;font-size:13px;margin-top:8px}
.summary-table th{text-align:left;padding:10px 14px;background:var(--surface-2);color:var(--text-soft);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
.summary-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:top}
.summary-table tr:last-child td{border-bottom:none}
.summary-cat{font-weight:700;color:var(--text);background:var(--surface-2);width:120px}
.summary-row{cursor:pointer}
.summary-row:hover td{background:var(--surface-2)}
.summary-row:hover td.summary-cat{background:var(--border)}
.recurring-inline-tag{margin-left:6px;color:var(--text-soft);font-size:11px}
.chat-dock{position:fixed;right:20px;bottom:20px;z-index:60}
.chat-toggle{background:var(--brand);color:#fff;border:none;border-radius:999px;padding:12px 18px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.chat-panel{width:320px;height:460px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:0 12px 40px rgba(0,0,0,.22);display:flex;flex-direction:column;overflow:hidden}
.chat-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface-2);font-weight:700;border-bottom:1px solid var(--border)}
.chat-tabs{display:flex;gap:4px;padding:8px 10px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-tab{background:var(--surface-2);border:none;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--text-soft);cursor:pointer;white-space:nowrap}
.chat-tab-active{background:var(--brand);color:#fff}
.chat-tab-live{box-shadow:0 0 0 2px var(--brand) inset}
.chat-toggle{position:relative}
.chat-toggle-alert{animation:chat-pulse 1.4s ease-in-out infinite}
@keyframes chat-pulse{0%,100%{box-shadow:0 8px 24px rgba(0,0,0,.18)}50%{box-shadow:0 8px 24px rgba(0,0,0,.18),0 0 0 6px var(--brand-soft)}}
.chat-badge{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;font-size:11px;font-weight:800;min-width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.chat-tab{position:relative}
.chat-tab-badge{margin-left:6px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:1px 6px}
.chat-ended-note{padding:10px 14px;font-size:12px;color:var(--text-soft);display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid var(--border);flex-shrink:0}
.chat-empty-admin{padding:20px 14px;display:flex;flex-direction:column;gap:12px;align-items:flex-start}
.chat-messages{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:10px;position:relative}
.chat-messages::before{content:'';position:absolute;inset:0;background-image:url('assets/favicon-transparent.png');background-repeat:no-repeat;background-position:center;background-size:55%;opacity:.08;pointer-events:none}
.chat-messages>*{position:relative;z-index:1}
.chat-msg{display:flex;flex-direction:column;gap:3px;max-width:88%}
.chat-msg-mine{align-self:flex-end;align-items:flex-end}
.chat-msg-head{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-soft)}
.chat-msg-from{font-weight:700}
.chat-msg-text{background:var(--surface-2);border-radius:12px;padding:7px 11px;font-size:13px}
.chat-msg-mine .chat-msg-text{background:var(--brand);color:#fff}
.chat-msg-gif{max-width:160px;border-radius:10px;display:block}
.mention-tag{color:var(--brand);font-weight:700}
.chat-msg-mine .mention-tag{color:#fff;text-decoration:underline}
.chat-mentions,.chat-gifs{border-top:1px solid var(--border);max-height:140px;overflow-y:auto;padding:6px;flex-shrink:0}
.chat-gifs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.chat-gif-thumb{border:none;background:none;padding:0;cursor:pointer;border-radius:8px;overflow:hidden}
.chat-gif-thumb img{width:100%;height:60px;object-fit:cover;border-radius:8px;display:block}
.chat-input-row{display:flex;gap:6px;padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.chat-input-row .input{flex:1}
@media (max-width:900px){.chat-panel{width:88vw;height:70vh}.chat-dock{right:12px;bottom:12px}}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-row{display:flex;flex-direction:column;gap:2px;padding:8px 10px;background:var(--surface-2);border-radius:var(--radius-sm)}
.history-text{font-size:12px;font-weight:600}
.history-meta{font-size:11px;color:var(--text-soft);font-weight:300}
.task-range-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;background:var(--surface-2);color:var(--text-soft);padding:2px 6px;border-radius:5px;margin-left:6px;vertical-align:middle}
.task-date-range{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.task-date-range input.input{min-width:0}
.task-date-arrow{color:var(--text-soft);font-size:12px}
.task-edit-dates{border:none;background:none;color:var(--brand);font-size:11px;font-weight:600;cursor:pointer;padding:0;margin-left:6px}
.task-chip{display:flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:4px 7px;font-size:11px;font-weight:600;cursor:pointer;width:100%;text-align:left}
.task-chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.task-chip-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-chip-done{opacity:.55;text-decoration:line-through}
.tutorial-intro{font-size:13px;color:var(--text-soft);font-weight:300;margin:-4px 0 16px}
.tutorial-list{display:flex;flex-direction:column;gap:10px}
.tutorial-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
.tutorial-head{display:flex;align-items:center;gap:14px;width:100%;padding:14px 16px;background:none;border:none;cursor:pointer;text-align:left}
.tutorial-head-main{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.tutorial-title{font-weight:700;font-size:14px}
.tutorial-summary{font-size:12px;font-weight:300;color:var(--text-soft)}
.tutorial-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--surface-2);color:var(--text-soft);flex-shrink:0;white-space:nowrap}
.tutorial-chevron{font-size:18px;color:var(--text-soft);transition:transform .15s ease;flex-shrink:0}
.tutorial-chevron-open{transform:rotate(90deg)}
.tutorial-body{padding:0 16px 18px;border-top:1px solid var(--border)}
.tutorial-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-soft);margin:16px 0 8px}
.tutorial-steps{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;font-size:13px}
.tutorial-notes{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--text-soft)}
.step-gallery{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.step-thumb{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface-2);cursor:zoom-in;padding:0;width:120px;height:80px;flex-shrink:0}
.step-thumb img{display:block;width:100%;height:100%;object-fit:cover;object-position:top}
.lightbox-overlay{position:fixed;inset:0;background:rgba(32,41,69,.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:40px}
.lightbox-img{max-width:100%;max-height:100%;border-radius:var(--radius-sm);cursor:default}
.lightbox-close{position:fixed;top:20px;right:24px;border:none;background:rgba(255,255,255,.15);color:#fff;width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer}
.live-badge{display:flex;align-items:center;gap:10px;background:var(--brand-soft);color:var(--brand-dark);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-weight:600;margin:12px 0}
.live-bar{background:var(--surface);border:1px solid var(--brand);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:16px}
.live-bar-title{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;color:var(--brand-dark);margin-bottom:10px}
.live-bar-row{display:flex;flex-wrap:wrap;gap:10px}
.live-card{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:none;border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;text-align:left}
.live-card-info{display:flex;flex-direction:column;gap:1px;min-width:0}
.live-card-title{font-size:13px;font-weight:700;color:var(--text)}
.live-card-sub{font-size:11px;color:var(--text-soft)}

/* toasts */
.toast-stack{position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{background:var(--text);color:var(--surface);padding:12px 16px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:14px;font-size:13px;font-weight:600;animation:toast-in .2s ease}
.toast-close{background:transparent;border:none;color:inherit;opacity:.6;cursor:pointer;font-size:15px}
@keyframes toast-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

@media (max-width:900px){
.app-body{flex-direction:column;overflow-y:auto}
.sidebar{width:100%;flex-direction:row;flex-wrap:wrap;overflow-x:auto}
.personal-columns{grid-template-columns:1fr}
.weekly-columns{grid-template-columns:1fr}
.weekly-stats{grid-template-columns:repeat(2,1fr)}
.analytics-grid{grid-template-columns:1fr}
.analytics-card-body{flex-direction:column;align-items:flex-start}
}
</style>
