<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plandeck — Team Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--bg:#ffffff;--surface:#ffffff;--surface-2:#f7f7fa;--border:rgba(32,41,69,.14);--line:rgba(32,41,69,.4);--text:#202945;--text-soft:rgba(32,41,69,.6);--brand:#FF6C0E;--brand-dark:#e05f0a;--brand-soft:#ffede0;--radius-lg:20px;--radius-md:14px;--radius-sm:10px;--shadow-card:none;--shadow-pop:none;--planned:#4B5F80;--planned-bg:#eaf6fd;--progress:#FF6C0E;--progress-bg:#fff1e2;--done:#3BAF90;--done-bg:#e6f7f1;--danger:#AC5D85;--danger-bg:#f7e9f0}
.dark{--bg:#202945;--surface:#26304f;--surface-2:#2e3a5c;--border:rgba(255,255,255,.14);--line:rgba(255,255,255,.3);--text:#f5f6fa;--text-soft:rgba(245,246,250,.65);--brand:#FFA400;--brand-soft:#3a3420;--planned-bg:#22344f;--progress-bg:#3a2e1c;--done-bg:#1c3a30;--danger-bg:#3a2430}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}
h1,h2,h3,.drawer-title,.brand-mark,.month-label{font-weight:800}
.field-label,.drawer-section-label,.side-title,.login-sub,.weekday,.task-meta,.day-num{font-weight:300}
#root{height:100%}
a{color:var(--brand)}
a:hover{color:var(--brand-dark)}
button{font-family:inherit}
.input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;margin-bottom:12px;font-family:inherit}
.input-sm{padding:7px 10px;font-size:13px;margin-bottom:0}
textarea.input{resize:vertical}
.btn{border:none;border-radius:var(--radius-sm);padding:10px 16px;font-weight:600;font-size:14px;cursor:pointer;transition:transform .12s,opacity .12s,background .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-dark)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--surface-2);color:var(--text)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--danger-bg);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--text-soft)}
.btn-ghost:hover{color:var(--text)}
.btn-block{width:100%}
.btn-sm{padding:6px 12px;font-size:13px}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:15px}
.icon-btn:hover{background:var(--surface-2)}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--border);background:var(--surface);color:var(--text-soft);border-radius:999px;padding:6px 12px;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.chip-clickable{cursor:pointer;transition:background .12s}
.chip-clickable:hover{background:var(--surface-2)}
.chip-active{border-color:transparent;font-weight:600}
.chip-participant{background:var(--brand-soft);color:var(--brand-dark);border:none}
.chip-x{border:none;background:transparent;color:inherit;cursor:pointer;font-size:14px;line-height:1;padding:0}
.chip-add{cursor:pointer;color:var(--brand)}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.avatar-xs{width:16px;height:16px;font-size:8px}
.avatar-sm{width:22px;height:22px;font-size:10px}

/* login */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.login-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:40px;width:100%;max-width:400px}
.login-mark{font-weight:800;color:var(--brand);letter-spacing:.02em;margin-bottom:16px;font-size:15px}
.login-card h1{margin:0 0 8px;font-size:26px}
.login-sub{color:var(--text-soft);font-size:14px;margin:0 0 24px}
.login-suggest{margin-top:20px;font-size:13px;color:var(--text-soft)}
.login-suggest span{display:block;margin-bottom:8px}

/* app shell */
.app-shell{height:100vh;display:flex;flex-direction:column;color:var(--text)}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:24px}
.brand-mark{font-weight:800;color:var(--brand);font-size:16px}
.month-nav{display:flex;align-items:center;gap:10px}
.nav-btn{border:1px solid var(--border);background:var(--surface);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--text);font-size:16px}
.nav-btn:hover{background:var(--surface-2)}
.month-label{font-weight:700;font-size:15px;min-width:150px;text-align:center}
.header-right{display:flex;align-items:center;gap:10px}
.user-menu-wrap{position:relative}
.user-chip{background:var(--brand-soft);color:var(--brand-dark);border:none;border-radius:999px;padding:8px 16px;font-weight:600;cursor:pointer;font-size:14px}
.app-body{flex:1;display:flex;overflow:hidden}

/* sidebar */
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:22px}
.side-nav{display:flex;flex-direction:column;gap:4px;background:var(--surface-2);border-radius:var(--radius-sm);padding:4px}
.side-nav-item{background:transparent;border:none;padding:9px 12px;border-radius:8px;text-align:left;cursor:pointer;color:var(--text-soft);font-weight:600;font-size:14px}
.side-nav-item:hover{color:var(--text)}
.side-nav-active{background:var(--surface);color:var(--brand-dark);border:1px solid var(--border)}
.side-title{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft);font-weight:700;margin-bottom:10px}
.side-block{display:flex;flex-direction:column;gap:8px}
.side-task{display:flex;flex-direction:column;gap:2px;background:var(--surface-2);border:none;border-radius:var(--radius-sm);padding:8px 10px;text-align:left;cursor:pointer}
.side-task:hover{background:var(--border)}
.side-task-title{font-size:13px;font-weight:600;color:var(--text)}
.side-task-sub{font-size:11px;color:var(--text-soft)}
.filter-group{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.empty-hint{color:var(--text-soft);font-size:13px;padding:6px 0}

/* main / calendar */
.app-main{flex:1;overflow-y:auto;padding:20px 24px}
.calendar{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.calendar-weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line)}
.weekday{padding:10px;text-align:center;font-size:12px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.04em}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.day-cell{min-height:118px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px;display:flex;flex-direction:column;gap:6px}
.day-cell-empty{background:var(--surface-2)}
.day-cell-today{background:var(--brand-soft)}
.day-cell-head{display:flex;align-items:center;justify-content:space-between}
.day-num{font-size:13px;color:var(--text-soft);font-weight:600}
.day-num-today{color:var(--brand-dark);font-weight:800}
.day-add{border:none;background:transparent;color:var(--text-soft);cursor:pointer;font-size:15px;border-radius:6px;width:20px;height:20px;line-height:1}
.day-add:hover{background:var(--border);color:var(--text)}
.day-cards{display:flex;flex-direction:column;gap:4px}
.mini-card{border-radius:8px;padding:5px 7px;font-size:12px;font-weight:600;cursor:grab;color:var(--text)}
.mini-card-title{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-card-time{display:block;font-size:10px;font-weight:300;color:var(--text-soft);margin-top:1px}
.mini-card-live{border:1px solid var(--brand)}
.mini-card-live-tag{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--brand-dark);margin-top:2px}
.day-more{border:none;background:transparent;color:var(--text-soft);font-size:11px;text-align:left;cursor:pointer;padding:2px 4px}
.day-more:hover{color:var(--brand)}

/* status pill */
.status-pill-wrap{position:relative;display:inline-block}
.status-pill{border:none;border-radius:999px;padding:6px 14px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.status-pill.lg{padding:8px 16px;font-size:14px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot-inline{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding-left:2px}
.status-dot-inline::before{content:'';width:7px;height:7px;border-radius:50%;background:inherit}
.status-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:6px;z-index:20;min-width:150px}
.status-menu-item{display:flex;align-items:center;gap:8px;width:100%;border:none;background:transparent;padding:8px 10px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;text-align:left}
.status-menu-item:hover{background:var(--surface-2)}

/* drawer / modal */
.drawer-overlay{position:fixed;inset:0;background:rgba(32,41,69,.35);display:flex;justify-content:flex-end;z-index:100}
.drawer{width:420px;max-width:92vw;height:100%;background:var(--surface);padding:28px;overflow-y:auto;position:relative;border-left:1px solid var(--border)}
.modal{width:460px;max-width:92vw;max-height:88vh;overflow-y:auto;margin:auto;background:var(--surface);border-radius:var(--radius-lg);padding:28px;position:relative;border:1px solid var(--border)}
.drawer-close{position:absolute;top:20px;right:20px;border:none;background:var(--surface-2);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--text-soft)}
.drawer-close:hover{color:var(--text)}
.drawer-title{margin:14px 0 4px;font-size:22px}
.drawer-date{color:var(--text-soft);font-size:13px;margin-bottom:12px}
.drawer-desc{color:var(--text);font-size:14px;line-height:1.5;margin-bottom:20px}
.drawer-section{margin-bottom:22px}
.btn-danger.btn-block{margin-top:4px}
.drawer-section-label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft);font-weight:700;margin-bottom:10px}
.field-label{display:block;font-size:12px;font-weight:700;color:var(--text-soft);margin-bottom:6px}
.participants{display:flex;flex-direction:column;gap:8px;position:relative}
.picker-pop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;display:flex;flex-direction:column;gap:6px;z-index:15}
.picker-item{border:none;background:var(--surface);border-radius:8px;padding:8px 10px;text-align:left;cursor:pointer;font-size:13px}
.picker-item:hover{background:var(--border)}
.picker-new{display:flex;gap:6px;margin-top:4px}

/* tasks */
.task-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.task-row{display:flex;align-items:center;gap:10px;background:var(--surface-2);border-radius:var(--radius-sm);padding:8px 10px}
.task-row-overdue{border:1px solid var(--danger)}
.task-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--brand);flex-shrink:0}
.task-info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.task-title{font-size:13px;font-weight:600}
.task-done{text-decoration:line-through;color:var(--text-soft)}
.task-meta{font-size:11px;color:var(--text-soft)}
.task-overdue{color:var(--danger);font-weight:700}
.task-remove{border:none;background:transparent;color:var(--text-soft);cursor:pointer;font-size:15px}
.new-task-form{display:grid;grid-template-columns:1fr 110px 130px auto;gap:6px}

/* personal view */
.personal-view{display:flex;flex-direction:column;gap:24px}
.personal-section h3{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:8px}
.personal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.activity-tile{background:var(--surface);border-radius:var(--radius-md);padding:14px;display:flex;flex-direction:column;gap:6px;text-align:left;border:1px solid var(--border);cursor:pointer}
.activity-tile:hover{border-color:var(--brand)}
.activity-tile-live{border:1px solid var(--brand);background:var(--brand-soft)}
.activity-tile-title{font-weight:700;font-size:14px}
.activity-tile-date{font-size:12px;color:var(--text-soft)}
.personal-columns{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.count-badge{background:var(--surface-2);color:var(--text-soft);font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700}
.count-danger{background:var(--danger-bg);color:var(--danger)}
.count-done{background:var(--done-bg);color:var(--done)}

/* weekly summary */
.weekly-header{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.weekly-range{font-weight:800;font-size:16px;min-width:170px}
.weekly-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px}
.weekly-stat{background:var(--surface);border:1px solid var(--border);border-left:3px solid;border-radius:var(--radius-md);padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.weekly-stat-num{font-size:26px;font-weight:800}
.weekly-stat-label{font-size:12px;font-weight:300;color:var(--text-soft)}
.weekly-columns{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.weekly-col{display:flex;flex-direction:column;gap:8px}
.weekly-col-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;margin-bottom:2px}
.recurring-chip{background:var(--surface-2);color:var(--text-soft);margin:10px 0 0;display:inline-flex}
.live-badge{display:flex;align-items:center;gap:10px;background:var(--brand-soft);color:var(--brand-dark);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-weight:600;margin:12px 0}
.live-bar{background:var(--surface);border:1px solid var(--brand);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:16px}
.live-bar-title{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;color:var(--brand-dark);margin-bottom:10px}
.live-bar-row{display:flex;flex-wrap:wrap;gap:10px}
.live-card{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:none;border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;text-align:left}
.live-card-info{display:flex;flex-direction:column;gap:1px;min-width:0}
.live-card-title{font-size:13px;font-weight:700;color:var(--text)}
.live-card-sub{font-size:11px;color:var(--text-soft)}

/* toasts */
.toast-stack{position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{background:var(--text);color:var(--surface);padding:12px 16px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:14px;font-size:13px;font-weight:600;animation:toast-in .2s ease}
.toast-close{background:transparent;border:none;color:inherit;opacity:.6;cursor:pointer;font-size:15px}
@keyframes toast-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

@media (max-width:900px){
.app-body{flex-direction:column;overflow-y:auto}
.sidebar{width:100%;flex-direction:row;flex-wrap:wrap;overflow-x:auto}
.personal-columns{grid-template-columns:1fr}
.weekly-columns{grid-template-columns:1fr}
.weekly-stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="dashboard-firebase.js"></script>
<script src="dashboard-data.js"></script>
<script type="text/babel" src="dashboard-components.jsx"></script>
<script type="text/babel" src="dashboard-app.jsx"></script>
</body>
</html>
